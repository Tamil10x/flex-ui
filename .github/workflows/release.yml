name: Release — Deploy to Production

on:
  push:
    branches: [main]

jobs:
  release:
    name: Build → Registry → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build registry
        run: npx tsx scripts/build-registry.ts

      - name: Build Next.js
        run: npx next build

      - name: Verify build
        run: |
          echo "=== Build Summary ==="
          echo "Registry components: $(ls public/r/*.json | grep -v index | wc -l)"
          echo "Build complete ✅"

