name: CI — Lint, Type Check, Build

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint → Type Check → Build → Registry
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0 || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build registry
        run: npx tsx scripts/build-registry.ts

      - name: Build Next.js
        run: npx next build

      - name: Verify registry output
        run: |
          echo "Registry files:"
          ls -la public/r/*.json | wc -l
          echo "Expected: 51+ component files + index.json"
          test -f public/r/index.json || (echo "Missing index.json" && exit 1)
